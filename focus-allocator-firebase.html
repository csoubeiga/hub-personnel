<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focus Allocator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f8fafc; font-family: 'DM Sans', sans-serif; color: #0f172a; min-height: 100vh; padding: 24px 16px 80px; }

  /* Hub link */
  .hub-link { display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:#64748b;text-decoration:none;margin-bottom:14px;padding:4px 10px;border-radius:20px;border:1.5px solid #e2e8f0;background:white;transition:all .15s; }
  .hub-link:hover { border-color:#0f172a;color:#0f172a; }

  /* Sync bar */
  .sync-bar { position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #e2e8f0;padding:6px 16px;display:flex;align-items:center;justify-content:center;gap:8px;font-size:10px;font-weight:600;color:#64748b;z-index:600; }
  .sync-dot { width:7px;height:7px;border-radius:50%;background:#94a3b8;flex-shrink:0;transition:background .3s; }
  .sync-dot.loading { background:#f59e0b;animation:pulse .8s infinite; }
  .sync-dot.ok { background:#16a34a; }
  .sync-dot.error { background:#dc2626; }
  @keyframes pulse { 0%,100%{opacity:1;}50%{opacity:.4;} }

  input[type=range] { -webkit-appearance:none;width:100%;height:6px;border-radius:3px;background:transparent;cursor:pointer; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:white;border:2px solid currentColor;box-shadow:0 1px 4px rgba(0,0,0,.15);transition:transform .15s; }
  input[type=range]::-webkit-slider-thumb:hover { transform:scale(1.25); }
  input[type=range]::-webkit-slider-runnable-track { height:6px;border-radius:3px; }

  .card { background:white;border-radius:16px;border:1px solid #e2e8f0;transition:box-shadow .2s,border-color .2s; }
  .card:hover { box-shadow:0 4px 20px rgba(0,0,0,.07); }
  .card.active { box-shadow:0 4px 20px rgba(0,0,0,.1); }

  .lock-btn { width:28px;height:28px;border:1.5px solid #e2e8f0;border-radius:8px;background:white;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .15s;flex-shrink:0; }
  .lock-btn.locked { background:#fef3c7;border-color:#fbbf24; }

  .cycle-btn { padding:6px 14px;border-radius:20px;border:1.5px solid #e2e8f0;background:white;cursor:pointer;font-size:13px;font-weight:500;color:#64748b;transition:all .15s; }
  .cycle-btn.active { background:#0f172a;color:white;border-color:#0f172a; }

  @keyframes fadeIn { from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;} }
  .fade-in { animation:fadeIn .3s ease; }
</style>
</head>
<body>

<div id="root"></div>

<div class="sync-bar">
  <div class="sync-dot" id="sync-dot"></div>
  <span id="sync-label">Initialisation…</span>
</div>

<!-- React + Babel -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<!-- Firebase -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, getDoc, setDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyC9qSli9HAWsM5mcEMjW5fEhgTQmrdR3TA",
  authDomain: "hub-personnel-firebase.firebaseapp.com",
  projectId: "hub-personnel-firebase",
  storageBucket: "hub-personnel-firebase.firebasestorage.app",
  messagingSenderId: "394129070920",
  appId: "1:394129070920:web:10f3303c22adcda47cf17d"
};

const app = initializeApp(firebaseConfig);
const firestore = getFirestore(app);
const DOC_PATH = 'focus-allocator/data';

function syncStatus(state, msg) {
  document.getElementById('sync-dot').className = 'sync-dot ' + state;
  document.getElementById('sync-label').textContent = msg;
}

let saveTimer = null;
window.__fa_firestore = firestore;
window.__fa_doc = () => doc(firestore, DOC_PATH);
window.__fa_getDoc = getDoc;
window.__fa_setDoc = setDoc;
window.__fa_syncStatus = syncStatus;
window.__fa_scheduleSave = function(data) {
  clearTimeout(saveTimer);
  syncStatus('loading', 'Modification…');
  saveTimer = setTimeout(async () => {
    syncStatus('loading', 'Sauvegarde…');
    try {
      await setDoc(doc(firestore, DOC_PATH), data);
      syncStatus('ok', '✓ Synchronisé');
      try { localStorage.setItem('fa_fallback', JSON.stringify(data)); } catch(_) {}
    } catch(e) {
      syncStatus('error', '⚠ Erreur sync — réessai dans 5s');
      setTimeout(() => window.__fa_scheduleSave(data), 5000);
    }
  }, 1200);
};

// Load data then boot React
syncStatus('loading', 'Chargement…');
let initialData = { history: [], values: null, cycle: 'week' };
try {
  const snap = await getDoc(doc(firestore, DOC_PATH));
  if (snap.exists()) initialData = snap.data();
  syncStatus('ok', '✓ Synchronisé');
} catch(e) {
  syncStatus('error', '⚠ Hors ligne — données locales');
  try {
    const raw = localStorage.getItem('fa_fallback');
    if (raw) initialData = JSON.parse(raw);
  } catch(_) {}
}
window.__fa_initialData = initialData;

// Boot React after Firebase ready
window.__fa_ready = true;
document.dispatchEvent(new Event('fa-ready'));
</script>

<script type="text/babel">
const { useState, useCallback, useEffect } = React;

const ACTIVITIES = [
  { id:"travail", label:"Travail",         sublabel:"Job principal",        icon:"💼", color:"#2563eb", lightColor:"#dbeafe", defaultValue:25, minValue:5  },
  { id:"cgp",     label:"CGP",             sublabel:"Conseil en patrimoine", icon:"📊", color:"#0891b2", lightColor:"#cffafe", defaultValue:20, minValue:0  },
  { id:"immo",    label:"Immobilier",      sublabel:"Gestion locative",      icon:"🏠", color:"#7c3aed", lightColor:"#ede9fe", defaultValue:10, minValue:0  },
  { id:"dj",      label:"DJ",              sublabel:"Musique & dates",        icon:"🎧", color:"#db2777", lightColor:"#fce7f3", defaultValue:10, minValue:0  },
  { id:"photo",   label:"Photo",           sublabel:"Shootings & retouche",   icon:"📷", color:"#ea580c", lightColor:"#ffedd5", defaultValue:5,  minValue:0  },
  { id:"famille", label:"Famille & Couple",sublabel:"Temps de qualité",       icon:"❤️", color:"#e11d48", lightColor:"#ffe4e6", defaultValue:15, minValue:5  },
  { id:"sport",   label:"Sport",           sublabel:"3× / semaine",           icon:"💪", color:"#16a34a", lightColor:"#dcfce7", defaultValue:10, minValue:5  },
  { id:"moi",     label:"Temps pour moi",  sublabel:"Recharge & slow",        icon:"🧘", color:"#ca8a04", lightColor:"#fef9c3", defaultValue:5,  minValue:5  },
];

const TOTAL = 100;

const BENCHMARKS = {
  travail:{ maintenance:25, construction:30, maintenanceDesc:"Semaine standard, réunions, livrables courants",    constructionDesc:"Projet stratégique, deadline, nouvelle mission",               questions:["Rush / deadline en cours ?","Projet structurant cette période ?"] },
  cgp:    { maintenance:10, construction:25, maintenanceDesc:"Suivi clients existants, veille réglementaire",      constructionDesc:"Prospection active, onboarding, préparation RDV R0→R2",        questions:["Phase de lancement / prospection ?","RDV pipeline à préparer ?"] },
  immo:   { maintenance:5,  construction:10, maintenanceDesc:"Suivi locataires, compta courante",                   constructionDesc:"Recherche bien, travaux, refinancement",                       questions:["Projet d'acquisition ou travaux ?","Problèmes locatifs en cours ?"] },
  dj:     { maintenance:5,  construction:15, maintenanceDesc:"Digging passif, écoute, 1 date/mois",                constructionDesc:"Préparation gig, production, implication asso",                questions:["Gig ou événement à préparer ?","Période de création / production ?"] },
  photo:  { maintenance:0,  construction:8,  maintenanceDesc:"Mode veille (pas de prestation active)",              constructionDesc:"Shooting + retouche + livraison (200-400€)",                   questions:["Prestation bookée ?","Je veux développer cet axe ce cycle ?"] },
  famille:{ maintenance:15, construction:15, maintenanceDesc:"Soirées & week-ends de qualité, présence réelle",     constructionDesc:"Plancher non négociable — qualité > quantité",                  questions:["Je déconnecte vraiment le soir ?","Événements familiaux importants ?"] },
  sport:  { maintenance:8,  construction:8,  maintenanceDesc:"3× / semaine, ~1h tout compris, mode automatique",   constructionDesc:"Routine non négociable",                                        questions:["3 séances confirmées cette semaine ?"] },
  moi:    { maintenance:7,  construction:7,  maintenanceDesc:"Lecture, décompression, pensée lente",               constructionDesc:"Indispensable contre le burn créatif",                         questions:["Vrai temps sans agenda prévu ?"] },
};

const CYCLE_LABELS = { week:"Semaine", month:"Mois", quarter:"Trimestre" };

function getWeekNumber(d) {
  const date = new Date(d); date.setHours(0,0,0,0);
  date.setDate(date.getDate() + 3 - ((date.getDay()+6)%7));
  const week1 = new Date(date.getFullYear(),0,4);
  return 1 + Math.round(((date-week1)/86400000 - 3 + (week1.getDay()+6)%7)/7);
}

function getCycleLabel(type) {
  const now = new Date();
  if (type==="week")  return `Semaine ${getWeekNumber(now)} — ${now.getFullYear()}`;
  if (type==="month") return now.toLocaleDateString("fr-FR",{month:"long",year:"numeric"});
  return `T${Math.ceil((now.getMonth()+1)/3)} ${now.getFullYear()}`;
}

function donut(pct, color, size=56) {
  const r=(size-8)/2, circ=2*Math.PI*r, dash=(pct/100)*circ;
  return (
    <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#f1f5f9" strokeWidth={6}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={6}
        strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
        style={{transition:"stroke-dasharray 0.4s cubic-bezier(.4,0,.2,1)"}}/>
    </svg>
  );
}

function StatusBadge({remaining}) {
  if (remaining===0) return <span style={{color:"#16a34a",fontWeight:700,fontSize:12}}>✓ Équilibré</span>;
  if (remaining>0)   return <span style={{color:"#ea580c",fontWeight:700,fontSize:12}}>+{remaining}% à redistribuer</span>;
  return <span style={{color:"#e11d48",fontWeight:700,fontSize:12}}>{remaining}% en dépassement</span>;
}

function HistoryChart({history}) {
  if (!history||history.length<2) return null;
  return (
    <div style={{marginTop:8}}>
      <div style={{fontSize:11,color:"#94a3b8",marginBottom:6,fontWeight:600,letterSpacing:1,textTransform:"uppercase"}}>Historique récent</div>
      <div style={{display:"flex",gap:6}}>
        {history.slice(-5).map((entry,i)=>(
          <div key={i} title={entry.label} style={{flex:1,borderRadius:8,overflow:"hidden",height:40,display:"flex",flexDirection:"column"}}>
            {ACTIVITIES.map(a=>(
              <div key={a.id} style={{background:a.color,height:`${entry.values[a.id]||0}%`,transition:"height 0.3s"}}/>
            ))}
          </div>
        ))}
      </div>
    </div>
  );
}

function GuidePanel({activity, value, onApply}) {
  const b = BENCHMARKS[activity.id]; if (!b) return null;
  const hours = Math.round(value*0.6);
  const isConstruction = value > b.maintenance;
  return (
    <div className="fade-in" style={{marginTop:12,padding:"12px 14px",background:"#f8fafc",borderRadius:12,border:"1px solid #e2e8f0",fontSize:12}} onClick={e=>e.stopPropagation()}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <span style={{color:"#64748b",fontWeight:600,fontSize:11,textTransform:"uppercase",letterSpacing:0.5}}>Repères</span>
        <span style={{fontFamily:"'DM Mono',monospace",fontSize:12,fontWeight:700,color:activity.color,background:activity.lightColor,padding:"2px 8px",borderRadius:20}}>≈ {hours}h / semaine</span>
      </div>
      <div style={{display:"flex",gap:6,marginBottom:10}}>
        {[{mode:"maintenance",label:"🔄 Maintenance",val:b.maintenance},{mode:"construction",label:"🚀 Construction",val:b.construction}].map(({mode,label,val})=>{
          const active = mode==="construction" ? isConstruction : !isConstruction;
          return (
            <button key={mode} onClick={()=>onApply(val)} style={{flex:1,padding:"7px 0",borderRadius:8,border:`1.5px solid ${active?activity.color:"#e2e8f0"}`,background:active?activity.lightColor:"white",color:active?activity.color:"#94a3b8",fontWeight:700,fontSize:11,cursor:"pointer",fontFamily:"inherit",transition:"all 0.15s"}}>
              {label} — {val}%
            </button>
          );
        })}
      </div>
      <div style={{color:"#475569",lineHeight:1.5,marginBottom:10}}>
        <span style={{fontWeight:600,color:isConstruction?activity.color:"#64748b"}}>{isConstruction?"🚀 ":"🔄 "}</span>
        {isConstruction?b.constructionDesc:b.maintenanceDesc}
      </div>
      <div style={{borderTop:"1px solid #e2e8f0",paddingTop:8}}>
        <div style={{fontSize:10,fontWeight:700,color:"#94a3b8",textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>Questions de calibrage</div>
        {b.questions.map((q,i)=>(
          <div key={i} style={{display:"flex",gap:6,marginBottom:4,color:"#64748b"}}>
            <span style={{color:activity.color,flexShrink:0}}>→</span><span>{q}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function defaultValues() {
  const v={}; ACTIVITIES.forEach(a=>v[a.id]=a.defaultValue); return v;
}

function FocusAllocator() {
  const init = window.__fa_initialData || {};
  const [cycle, setCycle]       = useState(init.cycle || "week");
  const [values, setValues]     = useState(init.values || defaultValues());
  const [locked, setLocked]     = useState({});
  const [history, setHistory]   = useState(init.history || []);
  const [saved, setSaved]       = useState(false);
  const [activeId, setActiveId] = useState(null);
  const [note, setNote]         = useState("");
  const [showGuide, setShowGuide] = useState({});

  // Persist to Firebase whenever values/history/cycle change (debounced)
  useEffect(() => {
    if (window.__fa_scheduleSave) {
      window.__fa_scheduleSave({ values, history, cycle });
    }
  }, [values, history, cycle]);

  const total = Object.values(values).reduce((a,b)=>a+b,0);
  const remaining = TOTAL - total;

  const handleChange = useCallback((id, newVal) => {
    setValues(prev => {
      const activity = ACTIVITIES.find(a=>a.id===id);
      const others   = ACTIVITIES.filter(a=>a.id!==id && !locked[a.id]);
      if (!others.length) return prev;
      const minSumOthers = others.reduce((s,a)=>s+a.minValue,0);
      const lockedSum    = ACTIVITIES.filter(a=>a.id!==id && locked[a.id]).reduce((s,a)=>s+prev[a.id],0);
      const maxForThis   = TOTAL - minSumOthers - lockedSum;
      const clamped      = Math.max(activity.minValue, Math.min(maxForThis, newVal));
      if (clamped===prev[id]) return prev;
      const budgetForOthers = TOTAL - lockedSum - clamped;
      const next = {...prev,[id]:clamped};
      const totalMins  = others.reduce((s,a)=>s+a.minValue,0);
      const flexBudget = budgetForOthers - totalMins;
      if (flexBudget<0) { others.forEach(a=>{ next[a.id]=a.minValue; }); return next; }
      const totalFlex = others.reduce((s,a)=>s+Math.max(0,prev[a.id]-a.minValue),0);
      let assigned=0;
      others.forEach((a,i)=>{
        if (i===others.length-1) { next[a.id]=a.minValue+(flexBudget-assigned); }
        else {
          const proportion = totalFlex>0 ? Math.max(0,prev[a.id]-a.minValue)/totalFlex : 1/others.length;
          const flex = Math.round(flexBudget*proportion);
          next[a.id] = a.minValue+flex;
          assigned += flex;
        }
      });
      return next;
    });
  }, [locked]);

  const handleSave = () => {
    const entry = { label:getCycleLabel(cycle), values:{...values}, note, cycle };
    setHistory(h=>[...h,entry]);
    setSaved(true); setTimeout(()=>setSaved(false),2000);
  };

  const handleReset = () => { setValues(defaultValues()); setLocked({}); setNote(""); };

  const topFocus = [...ACTIVITIES].sort((a,b)=>values[b.id]-values[a.id]).slice(0,3);

  return (
    <div style={{fontFamily:"'DM Sans','Segoe UI',sans-serif",background:"#f8fafc",minHeight:"100vh",padding:"24px 16px",color:"#0f172a"}}>
      <div style={{maxWidth:520,margin:"0 auto"}}>

        <a href="index.html" className="hub-link">← Hub</a>

        {/* Header */}
        <div style={{marginBottom:24,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <h1 style={{margin:0,fontSize:22,fontWeight:700,letterSpacing:-0.5,color:"#0f172a"}}>Focus Allocator</h1>
            <div style={{fontSize:13,color:"#94a3b8",marginTop:2}}>{getCycleLabel(cycle)}</div>
          </div>
          <div style={{display:"flex",gap:6}}>
            {Object.entries(CYCLE_LABELS).map(([k,v])=>(
              <button key={k} className={`cycle-btn ${cycle===k?"active":""}`} onClick={()=>setCycle(k)}>{v}</button>
            ))}
          </div>
        </div>

        {/* Total gauge */}
        <div className="card" style={{padding:"16px 20px",marginBottom:16}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
            <span style={{fontSize:13,fontWeight:600,color:"#64748b"}}>BUDGET D'ÉNERGIE TOTAL</span>
            <StatusBadge remaining={remaining}/>
          </div>
          <div style={{position:"relative",height:10,background:"#f1f5f9",borderRadius:5,overflow:"hidden"}}>
            <div style={{position:"absolute",left:0,top:0,height:"100%",width:`${Math.min(100,total)}%`,borderRadius:5,background:total>100?"#e11d48":total===100?"#16a34a":"#2563eb",transition:"width 0.4s cubic-bezier(.4,0,.2,1),background 0.3s"}}/>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:6}}>
            <span style={{fontSize:11,color:"#94a3b8",fontFamily:"'DM Mono',monospace"}}>{total}% utilisé</span>
            <span style={{fontSize:11,color:"#94a3b8",fontFamily:"'DM Mono',monospace"}}>100% max</span>
          </div>
          <div style={{marginTop:12,height:8,borderRadius:4,overflow:"hidden",display:"flex",gap:1}}>
            {ACTIVITIES.map(a=>(
              <div key={a.id} title={`${a.label}: ${values[a.id]}%`} style={{background:a.color,flex:values[a.id],transition:"flex 0.4s cubic-bezier(.4,0,.2,1)",minWidth:values[a.id]>0?2:0}}/>
            ))}
          </div>
        </div>

        {/* Top 3 */}
        <div style={{display:"flex",gap:8,marginBottom:16}}>
          {topFocus.map((a,i)=>(
            <div key={a.id} className="card fade-in" style={{flex:1,padding:"10px 12px",borderLeft:`3px solid ${a.color}`}}>
              <div style={{fontSize:18,marginBottom:2}}>{a.icon}</div>
              <div style={{fontSize:11,fontWeight:700,color:"#0f172a"}}>{a.label}</div>
              <div style={{fontSize:20,fontWeight:700,color:a.color,fontFamily:"'DM Mono',monospace"}}>{values[a.id]}%</div>
              <div style={{fontSize:10,color:"#94a3b8"}}>#{i+1} priorité</div>
            </div>
          ))}
        </div>

        {/* Activity cards */}
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {ACTIVITIES.map(a=>{
            const isActive=activeId===a.id, isLocked=!!locked[a.id];
            return (
              <div key={a.id} className={`card ${isActive?"active":""}`} style={{"--card-color":a.color,padding:"14px 16px",cursor:"pointer",borderColor:isActive?a.color:undefined}} onClick={()=>setActiveId(isActive?null:a.id)}>
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <div style={{position:"relative",flexShrink:0}}>
                    {donut(values[a.id],a.color)}
                    <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>{a.icon}</div>
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}>
                      <span style={{fontWeight:600,fontSize:14}}>{a.label}</span>
                      {isLocked&&<span style={{fontSize:10,background:"#fef3c7",color:"#b45309",padding:"1px 6px",borderRadius:10,fontWeight:600}}>verrouillé</span>}
                    </div>
                    <div style={{fontSize:11,color:"#94a3b8"}}>{a.sublabel}</div>
                    {isActive&&(
                      <div className="fade-in" style={{marginTop:10}} onClick={e=>e.stopPropagation()}>
                        <input type="range" min={a.minValue} max={100} value={values[a.id]} style={{color:a.color,accentColor:a.color}} onChange={e=>handleChange(a.id,+e.target.value)}/>
                        <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#94a3b8",marginTop:2}}>
                          <span>min {a.minValue}%</span><span>max 100%</span>
                        </div>
                        <button onClick={()=>setShowGuide(g=>({...g,[a.id]:!g[a.id]}))} style={{marginTop:8,padding:"5px 12px",borderRadius:20,border:`1.5px solid ${showGuide[a.id]?a.color:"#e2e8f0"}`,background:showGuide[a.id]?a.lightColor:"white",color:showGuide[a.id]?a.color:"#94a3b8",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit",transition:"all 0.15s"}}>
                          {showGuide[a.id]?"▲ Masquer la grille":"📐 Grille de calibrage"}
                        </button>
                        {showGuide[a.id]&&<GuidePanel activity={a} value={values[a.id]} onApply={val=>handleChange(a.id,val)}/>}
                      </div>
                    )}
                  </div>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}} onClick={e=>e.stopPropagation()}>
                    <div style={{fontFamily:"'DM Mono',monospace",fontSize:20,fontWeight:700,color:a.color,lineHeight:1}}>{values[a.id]}%</div>
                    <button className={`lock-btn ${isLocked?"locked":""}`} title={isLocked?"Déverrouiller":"Verrouiller ce niveau"} onClick={()=>setLocked(l=>({...l,[a.id]:!l[a.id]}))}>
                      {isLocked?"🔒":"🔓"}
                    </button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>

        {/* Intention */}
        <div className="card" style={{padding:16,marginTop:16}}>
          <div style={{fontSize:12,fontWeight:600,color:"#64748b",marginBottom:8}}>INTENTION DU CYCLE</div>
          <textarea value={note} onChange={e=>setNote(e.target.value)} placeholder="Quel est ton objectif principal pour ce cycle ? Qu'est-ce que tu veux accomplir ?" style={{width:"100%",minHeight:70,border:"1px solid #e2e8f0",borderRadius:10,padding:"10px 12px",fontSize:13,color:"#0f172a",resize:"none",outline:"none",fontFamily:"inherit",lineHeight:1.5}}/>
        </div>

        {/* Actions */}
        <div style={{display:"flex",gap:10,marginTop:14}}>
          <button onClick={handleReset} style={{flex:1,padding:"12px",borderRadius:12,border:"1.5px solid #e2e8f0",background:"white",cursor:"pointer",fontSize:14,fontWeight:600,color:"#64748b",fontFamily:"inherit"}}>Réinitialiser</button>
          <button onClick={handleSave} style={{flex:2,padding:"12px",borderRadius:12,border:"none",background:saved?"#16a34a":"#0f172a",color:"white",cursor:"pointer",fontSize:14,fontWeight:700,fontFamily:"inherit",transition:"background 0.3s"}}>
            {saved?"✓ Sauvegardé !":`Valider ma répartition ${CYCLE_LABELS[cycle].toLowerCase()}`}
          </button>
        </div>

        {/* History */}
        {history.length>0&&(
          <div className="card" style={{padding:16,marginTop:16}}>
            <HistoryChart history={history}/>
            <div style={{marginTop:12}}>
              <div style={{fontSize:11,color:"#94a3b8",fontWeight:600,letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>Archives</div>
              {[...history].reverse().map((entry,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 0",borderBottom:i<history.length-1?"1px solid #f1f5f9":"none",fontSize:12}}>
                  <div style={{flex:1,fontWeight:500,color:"#334155"}}>{entry.label}</div>
                  <div style={{display:"flex",gap:4}}>
                    {ACTIVITIES.slice(0,4).map(a=>(
                      <div key={a.id} title={`${a.label}: ${entry.values[a.id]}%`} style={{width:24,height:24,borderRadius:6,background:a.lightColor,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:a.color,fontFamily:"'DM Mono',monospace"}}>{entry.values[a.id]}</div>
                    ))}
                    <div style={{width:24,height:24,borderRadius:6,background:"#f1f5f9",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#94a3b8"}}>+{ACTIVITIES.length-4}</div>
                  </div>
                  {entry.note&&<div style={{fontSize:11,color:"#94a3b8",maxWidth:100,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>"{entry.note}"</div>}
                </div>
              ))}
            </div>
          </div>
        )}

        <div style={{textAlign:"center",marginTop:20,marginBottom:20,fontSize:11,color:"#cbd5e1"}}>
          L'énergie est une ressource finie. Choisir, c'est renoncer — et c'est ça la force.
        </div>
      </div>
    </div>
  );
}

// Wait for Firebase to be ready before rendering
function boot() {
  ReactDOM.createRoot(document.getElementById('root')).render(<FocusAllocator/>);
}
if (window.__fa_ready) { boot(); }
else { document.addEventListener('fa-ready', boot); }
</script>
</body>
</html>
