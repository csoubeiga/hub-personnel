<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hub — Cédric</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #FAF8F4;
      --ink: #1A1814;
      --accent: #C8602A;
      --accent-light: #F5EDE6;
      --muted: #8A8580;
      --card: #FFFFFF;
      --border: #E8E4DC;
      --danger: #DC2626;
      --danger-light: #FEE2E2;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; }

    /* HEADER */
    header {
      padding: 3rem 4rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: flex-end; justify-content: space-between; gap: 2rem;
    }
    .header-left h1 { font-family: 'DM Serif Display', serif; font-size: clamp(2.2rem, 5vw, 3.5rem); line-height: 1.05; letter-spacing: -0.02em; }
    .header-left h1 em { font-style: italic; color: var(--accent); }
    .header-left p { margin-top: 0.6rem; color: var(--muted); font-size: 0.95rem; font-weight: 300; }
    .header-right { display: flex; align-items: center; gap: 1rem; }
    .header-date { text-align: right; font-size: 0.85rem; color: var(--muted); font-weight: 300; line-height: 1.6; }
    .btn-admin {
      padding: 0.45rem 1rem; border-radius: 8px; border: 1px solid var(--border);
      background: var(--card); font-family: 'DM Sans', sans-serif; font-size: 0.8rem;
      font-weight: 500; color: var(--muted); cursor: pointer; transition: all 0.15s;
      white-space: nowrap;
    }
    .btn-admin:hover { border-color: var(--accent); color: var(--accent); }
    .btn-admin.active { background: var(--accent); color: white; border-color: var(--accent); }

    /* MAIN */
    main { padding: 3rem 4rem; max-width: 1100px; }
    .section-label { font-size: 0.72rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 1.4rem; }

    /* GRID */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1.2rem; margin-bottom: 3.5rem; }

    /* CARD */
    .card {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 1.6rem; text-decoration: none; color: inherit;
      display: flex; flex-direction: column; gap: 0.8rem;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
      position: relative; overflow: hidden; cursor: pointer;
    }
    .card::before {
      content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%;
      background: var(--accent); transform: scaleY(0); transform-origin: bottom; transition: transform 0.2s ease;
    }
    .card:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(0,0,0,0.07); border-color: #D4CEC4; }
    .card:hover::before { transform: scaleY(1); }
    .card-icon { font-size: 1.6rem; line-height: 1; }
    .card-title { font-family: 'DM Serif Display', serif; font-size: 1.15rem; line-height: 1.2; }
    .card-desc { font-size: 0.84rem; color: var(--muted); font-weight: 300; line-height: 1.5; flex: 1; }
    .card-tag {
      display: inline-block; font-size: 0.7rem; font-weight: 500; letter-spacing: 0.08em;
      text-transform: uppercase; padding: 0.2rem 0.55rem; border-radius: 4px;
      background: var(--cream); color: var(--muted); border: 1px solid var(--border); align-self: flex-start;
    }

    /* ADMIN MODE */
    .card.admin-mode { cursor: default; }
    .card.admin-mode:hover { transform: none; box-shadow: none; }
    .card.admin-mode::before { display: none; }
    .card-admin-controls {
      display: none; position: absolute; top: 0.6rem; right: 0.6rem;
      gap: 0.3rem; flex-direction: column;
    }
    .admin-mode .card-admin-controls { display: flex; }
    .ctrl-btn {
      width: 26px; height: 26px; border-radius: 6px; border: 1px solid var(--border);
      background: white; cursor: pointer; font-size: 0.75rem; display: flex;
      align-items: center; justify-content: center; transition: all 0.12s;
    }
    .ctrl-btn:hover { border-color: var(--accent); background: var(--accent-light); }
    .ctrl-btn.del:hover { border-color: var(--danger); background: var(--danger-light); }
    .card.admin-mode { padding-right: 3rem; }

    /* ADMIN PANEL */
    .admin-panel {
      display: none; background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; padding: 2rem; margin-bottom: 2rem;
    }
    .admin-panel.open { display: block; }
    .admin-panel h3 { font-family: 'DM Serif Display', serif; font-size: 1.2rem; margin-bottom: 1.2rem; }
    .admin-panel h3 em { font-style: italic; color: var(--accent); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; margin-bottom: 0.8rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.35rem; }
    .form-group label { font-size: 0.72rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
    .form-group input, .form-group select {
      padding: 0.55rem 0.8rem; border: 1px solid var(--border); border-radius: 8px;
      font-family: 'DM Sans', sans-serif; font-size: 0.88rem; background: var(--cream);
      color: var(--ink); outline: none; transition: border-color 0.15s;
    }
    .form-group input:focus { border-color: var(--accent); }
    .form-actions { display: flex; gap: 0.7rem; margin-top: 1rem; }
    .btn {
      padding: 0.6rem 1.2rem; border-radius: 8px; font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { opacity: 0.88; }
    .btn-ghost { background: var(--cream); color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--border); }

    /* EMPTY STATE */
    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--muted); font-weight: 300; }
    .empty-state p { margin-bottom: 0.5rem; }

    /* STATUS */
    #statusBar { text-align: center; padding: 0.5rem; font-size: 0.78rem; color: var(--muted); min-height: 24px; }
    #statusBar.ok { color: #16a34a; }
    #statusBar.err { color: var(--danger); }

    /* LOADING SKELETON */
    .skeleton { background: linear-gradient(90deg, #f0ede8 25%, #e8e4dc 50%, #f0ede8 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; border-radius: 8px; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    footer { padding: 2rem 4rem; border-top: 1px solid var(--border); font-size: 0.8rem; color: var(--muted); font-weight: 300; }

    @media (max-width: 640px) {
      header, main, footer { padding-left: 1.4rem; padding-right: 1.4rem; }
      header { flex-direction: column; align-items: flex-start; }
      .header-date { text-align: left; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Mon <em>Hub</em><br>personnel</h1>
    <p>Outils synchronisés · Accessibles partout</p>
  </div>
  <div class="header-right">
    <div class="header-date" id="dateDisplay"></div>
    <button class="btn-admin" id="btnAdmin">⚙️ Gérer</button>
  </div>
</header>

<main>

  <!-- ADMIN PANEL -->
  <div class="admin-panel" id="adminPanel">
    <h3>Ajouter un <em>outil</em></h3>
    <div class="form-row">
      <div class="form-group">
        <label>Emoji</label>
        <input type="text" id="inEmoji" placeholder="📅" maxlength="4"/>
      </div>
      <div class="form-group">
        <label>Titre</label>
        <input type="text" id="inTitle" placeholder="Calendrier"/>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Description</label>
        <input type="text" id="inDesc" placeholder="Événements synchronisés…"/>
      </div>
      <div class="form-group">
        <label>Catégorie</label>
        <input type="text" id="inTag" placeholder="Agenda"/>
      </div>
    </div>
    <div class="form-group">
      <label>Fichier HTML (ex: calendrier.html)</label>
      <input type="text" id="inFile" placeholder="mon-outil.html"/>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" id="btnAdd">Ajouter l'outil</button>
      <button class="btn btn-ghost" id="btnCancelAdmin">Annuler</button>
    </div>
  </div>

  <p class="section-label" id="sectionLabel">Chargement…</p>
  <div class="grid" id="toolsGrid"></div>
  <div id="statusBar"></div>

</main>

<footer>Hub personnel · GitHub Pages · Firebase Firestore</footer>

<!-- FIREBASE -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getFirestore, collection, doc, onSnapshot,
    addDoc, updateDoc, deleteDoc, query, orderBy
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const FB = {
    apiKey: "AIzaSyC9qSli9HAWsM5mcEMjW5fEhgTQmrdR3TA",
    authDomain: "hub-personnel-firebase.firebaseapp.com",
    projectId: "hub-personnel-firebase",
    storageBucket: "hub-personnel-firebase.firebasestorage.app",
    messagingSenderId: "394129070920",
    appId: "1:394129070920:web:10f3303c22adcda47cf17d"
  };

  const app = initializeApp(FB);
  const db = getFirestore(app);
  const toolsCol = collection(db, 'hub-tools');

  let tools = [];
  let adminMode = false;

  // ── STATUS ────────────────────────────────────────────────────
  function setStatus(msg, type='') {
    const el = document.getElementById('statusBar');
    el.textContent = msg; el.className = type;
    if (type === 'ok') setTimeout(() => { el.textContent = ''; el.className = ''; }, 2000);
  }

  // ── DATE ──────────────────────────────────────────────────────
  const opts = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
  document.getElementById('dateDisplay').textContent =
    new Date().toLocaleDateString('fr-FR', opts).replace(/^\w/, c => c.toUpperCase());

  // ── RENDER ────────────────────────────────────────────────────
  function render() {
    const grid = document.getElementById('toolsGrid');
    const label = document.getElementById('sectionLabel');
    grid.innerHTML = '';

    if (tools.length === 0) {
      label.textContent = 'Aucun outil';
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
        <p>Aucun outil pour l'instant.</p>
        <p>Clique sur <strong>⚙️ Gérer</strong> pour ajouter ton premier outil.</p>
      </div>`;
      return;
    }

    label.textContent = `${tools.length} outil${tools.length > 1 ? 's' : ''}`;

    tools.forEach((tool, idx) => {
      const card = document.createElement('div');
      card.className = 'card' + (adminMode ? ' admin-mode' : '');

      if (!adminMode) {
        card.onclick = () => window.location.href = tool.file;
      }

      card.innerHTML = `
        <div class="card-icon">${tool.emoji || '🔧'}</div>
        <div class="card-title">${tool.title}</div>
        <div class="card-desc">${tool.desc || ''}</div>
        <span class="card-tag">${tool.tag || ''}</span>
        <div class="card-admin-controls">
          <button class="ctrl-btn" title="Monter" data-action="up" data-id="${tool.id}" data-idx="${idx}">↑</button>
          <button class="ctrl-btn" title="Descendre" data-action="down" data-id="${tool.id}" data-idx="${idx}">↓</button>
          <button class="ctrl-btn del" title="Supprimer" data-action="del" data-id="${tool.id}">✕</button>
        </div>`;

      grid.appendChild(card);
    });

    // Wire admin controls
    grid.querySelectorAll('.ctrl-btn').forEach(btn => {
      btn.onclick = (e) => { e.stopPropagation(); handleControl(btn); };
    });
  }

  // ── ADMIN CONTROLS ────────────────────────────────────────────
  async function handleControl(btn) {
    const action = btn.dataset.action;
    const id = btn.dataset.id;
    const idx = parseInt(btn.dataset.idx);

    if (action === 'del') {
      if (!confirm(`Supprimer "${tools[idx]?.title}" du hub ?`)) return;
      try {
        await deleteDoc(doc(db, 'hub-tools', id));
        setStatus('Outil supprimé', 'ok');
      } catch(e) { setStatus('Erreur: ' + e.message, 'err'); }
    }

    if (action === 'up' && idx > 0) {
      const a = tools[idx], b = tools[idx - 1];
      try {
        await updateDoc(doc(db, 'hub-tools', a.id), { order: b.order });
        await updateDoc(doc(db, 'hub-tools', b.id), { order: a.order });
      } catch(e) { setStatus('Erreur: ' + e.message, 'err'); }
    }

    if (action === 'down' && idx < tools.length - 1) {
      const a = tools[idx], b = tools[idx + 1];
      try {
        await updateDoc(doc(db, 'hub-tools', a.id), { order: b.order });
        await updateDoc(doc(db, 'hub-tools', b.id), { order: a.order });
      } catch(e) { setStatus('Erreur: ' + e.message, 'err'); }
    }
  }

  // ── TOGGLE ADMIN ──────────────────────────────────────────────
  const btnAdmin = document.getElementById('btnAdmin');
  const adminPanel = document.getElementById('adminPanel');

  btnAdmin.onclick = () => {
    adminMode = !adminMode;
    btnAdmin.textContent = adminMode ? '✕ Terminer' : '⚙️ Gérer';
    btnAdmin.classList.toggle('active', adminMode);
    adminPanel.classList.toggle('open', adminMode);
    render();
  };

  document.getElementById('btnCancelAdmin').onclick = () => {
    adminMode = false;
    btnAdmin.textContent = '⚙️ Gérer';
    btnAdmin.classList.remove('active');
    adminPanel.classList.remove('open');
    render();
  };

  // ── ADD TOOL ──────────────────────────────────────────────────
  document.getElementById('btnAdd').onclick = async () => {
    const emoji = document.getElementById('inEmoji').value.trim();
    const title = document.getElementById('inTitle').value.trim();
    const desc  = document.getElementById('inDesc').value.trim();
    const tag   = document.getElementById('inTag').value.trim();
    const file  = document.getElementById('inFile').value.trim();

    if (!title || !file) {
      setStatus('Titre et fichier sont obligatoires', 'err'); return;
    }

    const maxOrder = tools.length > 0 ? Math.max(...tools.map(t => t.order || 0)) : 0;

    try {
      await addDoc(toolsCol, { emoji, title, desc, tag, file, order: maxOrder + 1, createdAt: Date.now() });
      // Reset form
      ['inEmoji','inTitle','inDesc','inTag','inFile'].forEach(id => document.getElementById(id).value = '');
      setStatus('✓ Outil ajouté', 'ok');
    } catch(e) { setStatus('Erreur: ' + e.message, 'err'); }
  };

  // Entrée clavier sur le dernier champ
  document.getElementById('inFile').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('btnAdd').click();
  });

  // ── FIRESTORE LISTENER ────────────────────────────────────────
  const q = query(toolsCol, orderBy('order'));
  onSnapshot(q, (snap) => {
    tools = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    render();
  }, (err) => {
    setStatus('Erreur Firebase: ' + err.message, 'err');
  });

</script>
</body>
</html>
